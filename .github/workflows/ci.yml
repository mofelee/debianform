name: CI

on:
  push:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      integration_cases: ${{ steps.integration_cases.outputs.cases }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Check formatting
        run: test -z "$(gofmt -l $(git ls-files '*.go'))"

      - name: Run static analysis
        run: go vet ./...

      - name: Run vulnerability scan
        run: make vulncheck

      - name: Run unit tests
        run: go test -race -count=1 ./...

      - name: Build CLI
        run: make build

      - name: Validate integration case layout
        run: make test-integration-layout

      - name: Discover integration cases
        id: integration_cases
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          cases = sorted(path.name for path in Path("test/integration/libvirt/cases").iterdir() if path.is_dir())
          if not cases:
              raise SystemExit("no libvirt integration cases discovered")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print("cases=" + json.dumps(cases), file=output)

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a", encoding="utf-8") as handle:
                  print("### Libvirt integration cases", file=handle)
                  for case in cases:
                      print(f"- `{case}`", file=handle)

          print("Discovered libvirt integration cases: " + ", ".join(cases))
          PY

  integration:
    name: Debian 13 libvirt (${{ matrix.case }})
    needs: unit
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        case: ${{ fromJSON(needs.unit.outputs.integration_cases) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Cache apt packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/apt-cache
          key: apt-${{ runner.os }}-libvirt-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            apt-${{ runner.os }}-libvirt-

      - name: Install libvirt and cloud image tools
        run: |
          sudo install -d -m 0755 "${{ runner.temp }}/apt-cache/partial"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            -o Dir::Cache::archives="${{ runner.temp }}/apt-cache" \
            cloud-image-utils \
            curl \
            dnsmasq-base \
            libvirt-clients \
            libvirt-daemon-system \
            openssh-client \
            ovmf \
            qemu-system-x86 \
            qemu-utils
          sudo chown -R "$(id -u):$(id -g)" "${{ runner.temp }}/apt-cache"
          sudo systemctl start libvirtd
          if [[ -e /dev/kvm ]]; then
            sudo chmod 0666 /dev/kvm
          fi

      - name: Resolve Debian 13 image checksum
        id: debian-image
        run: |
          sha512="$(
            curl --fail --location --retry 3 --show-error --silent \
              https://cloud.debian.org/images/cloud/trixie/latest/SHA512SUMS |
              awk '$2 == "debian-13-genericcloud-amd64.qcow2" { print $1; exit }'
          )"
          test -n "$sha512"
          echo "sha512=$sha512" >> "$GITHUB_OUTPUT"

      - name: Cache Debian 13 cloud image
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/debian-image-cache
          key: debian13-genericcloud-${{ steps.debian-image.outputs.sha512 }}

      - name: Run Debian 13 VM integration test
        run: |
          artifact_root="${DBF_INTEGRATION_ARTIFACT_DIR:?}"
          for attempt in 1 2; do
            export DBF_INTEGRATION_ARTIFACT_DIR="$artifact_root/attempt-$attempt"
            echo "Running libvirt integration attempt $attempt for case ${DBF_INTEGRATION_CASE}"
            if make test-integration; then
              exit 0
            else
              status=$?
            fi
            if [[ "$attempt" == "2" ]]; then
              exit "$status"
            fi
            echo "Libvirt integration attempt $attempt failed; retrying once."
            sleep 10
          done
        env:
          DBF_INTEGRATION_CASE: ${{ matrix.case }}
          DBF_INTEGRATION_ARTIFACT_DIR: ${{ runner.temp }}/debianform-integration-artifacts
          DBF_INTEGRATION_IMAGE_CACHE: ${{ runner.temp }}/debian-image-cache

      - name: Upload libvirt diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debianform-libvirt-${{ matrix.case }}-diagnostics
          path: ${{ runner.temp }}/debianform-integration-artifacts
          if-no-files-found: ignore
          retention-days: 7
