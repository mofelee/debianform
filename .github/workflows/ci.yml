name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l $(git ls-files '*.go'))"

      - name: Run static analysis
        run: go vet ./...

      - name: Run unit tests
        run: go test -race -count=1 ./...

      - name: Build CLI
        run: make build

  integration:
    name: Debian 13 libvirt integration
    needs: unit
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libvirt and cloud image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cloud-image-utils \
            curl \
            dnsmasq-base \
            libvirt-clients \
            libvirt-daemon-system \
            openssh-client \
            qemu-system-x86 \
            qemu-utils
          sudo systemctl start libvirtd
          if [[ -e /dev/kvm ]]; then
            sudo chmod 0666 /dev/kvm
          fi

      - name: Run Debian 13 VM integration test
        run: make test-integration
        env:
          DBF_INTEGRATION_ARTIFACT_DIR: ${{ runner.temp }}/debianform-integration-artifacts

      - name: Upload libvirt diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: debianform-libvirt-diagnostics
          path: ${{ runner.temp }}/debianform-integration-artifacts
          if-no-files-found: ignore
          retention-days: 7
