name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Check formatting
        run: test -z "$(gofmt -l $(git ls-files '*.go'))"

      - name: Run static analysis
        run: go vet ./...

      - name: Run unit tests
        run: go test -race -count=1 ./...

      - name: Build CLI
        run: make build

  integration:
    name: Debian 13 libvirt integration
    needs: unit
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Install libvirt and cloud image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cloud-image-utils \
            curl \
            dnsmasq-base \
            libvirt-clients \
            libvirt-daemon-system \
            openssh-client \
            qemu-system-x86 \
            qemu-utils
          sudo systemctl start libvirtd
          if [[ -e /dev/kvm ]]; then
            sudo chmod 0666 /dev/kvm
          fi

      - name: Run Debian 13 VM integration test
        run: make test-integration
        env:
          DBF_INTEGRATION_ARTIFACT_DIR: ${{ runner.temp }}/debianform-integration-artifacts

      - name: Upload libvirt diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debianform-libvirt-diagnostics
          path: ${{ runner.temp }}/debianform-integration-artifacts
          if-no-files-found: ignore
          retention-days: 7
