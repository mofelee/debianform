name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      tag: ${{ github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Install GoReleaser
        env:
          GORELEASER_VERSION: 2.16.0
        run: |
          cd "${RUNNER_TEMP}"
          archive="goreleaser_Linux_x86_64.tar.gz"
          base_url="https://github.com/goreleaser/goreleaser/releases/download/v${GORELEASER_VERSION}"
          curl --fail --location --retry 3 --show-error --silent --output "${archive}" "${base_url}/${archive}"
          curl --fail --location --retry 3 --show-error --silent --output checksums.txt "${base_url}/checksums.txt"
          grep " ${archive}$" checksums.txt | sha256sum --check -
          tar -xzf "${archive}" goreleaser
          install -D -m 0755 goreleaser "${HOME}/.local/bin/goreleaser"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Run static analysis
        run: go vet ./...

      - name: Run unit tests
        run: go test -race -count=1 ./...

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: goreleaser release --clean

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: scripts/update-homebrew-formula.sh "${GITHUB_REF_NAME}" dist/checksums.txt

  verify:
    name: Post-release verification
    needs: release
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Verify curl installer on Linux amd64
        run: |
          prefix="${RUNNER_TEMP}/debianform-install"
          sh scripts/install.sh \
            --version "${{ needs.release.outputs.tag }}" \
            --prefix "${prefix}" \
            --os linux \
            --arch amd64 \
            --force
          "${prefix}/bin/dbf" version | tee "${RUNNER_TEMP}/dbf-version.txt"
          grep "${{ needs.release.outputs.tag }}" "${RUNNER_TEMP}/dbf-version.txt"
          "${prefix}/bin/dbf" validate -f examples/v2-bbr.dbf.hcl
          "${prefix}/bin/dbf" plan -f examples/v2-bbr.dbf.hcl --offline

      - name: Verify Homebrew path when available
        id: homebrew
        run: |
          if ! command -v brew >/dev/null 2>&1; then
            echo "status=manual/best-effort" >> "$GITHUB_OUTPUT"
            echo "Homebrew is not installed on this runner; skipping brew install/test." >&2
            exit 0
          fi
          brew update
          brew tap mofelee/debianform
          brew install mofelee/debianform/dbf
          brew test mofelee/debianform/dbf
          brew upgrade dbf
          echo "status=yes" >> "$GITHUB_OUTPUT"

      - name: Write verification matrix
        run: |
          homebrew_status="${{ steps.homebrew.outputs.status }}"
          if [ -z "$homebrew_status" ]; then
            homebrew_status="manual/best-effort"
          fi
          cat > "${RUNNER_TEMP}/release-verification-matrix.md" <<EOF
          | Path | linux/amd64 | linux/arm64 | darwin/amd64 | darwin/arm64 |
          | --- | --- | --- | --- | --- |
          | Artifact build | yes | yes | yes | yes |
          | curl install | yes | manual/best-effort | manual/best-effort | manual/best-effort |
          | Homebrew install | ${homebrew_status} | manual/best-effort | manual/best-effort | manual/best-effort |
          EOF
          cat "${RUNNER_TEMP}/release-verification-matrix.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Add verification matrix to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.release.outputs.tag }}"
          release_body="${RUNNER_TEMP}/release-body.md"
          updated_body="${RUNNER_TEMP}/release-body-updated.md"
          gh release view "$tag" --json body --jq '.body // ""' > "$release_body"
          awk '
            /^## Verification Matrix$/ { skip = 1; next }
            skip && /^## / { skip = 0 }
            !skip { print }
          ' "$release_body" > "$updated_body"
          {
            printf '\n## Verification Matrix\n\n'
            cat "${RUNNER_TEMP}/release-verification-matrix.md"
          } >> "$updated_body"
          gh release edit "$tag" --notes-file "$updated_body"

      - name: Upload verification matrix
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-verification-${{ needs.release.outputs.tag }}
          path: ${{ runner.temp }}/release-verification-matrix.md
          if-no-files-found: error
          retention-days: 30
