name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      tag: ${{ github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Install GoReleaser
        env:
          GORELEASER_VERSION: 2.16.0
        run: |
          cd "${RUNNER_TEMP}"
          archive="goreleaser_Linux_x86_64.tar.gz"
          base_url="https://github.com/goreleaser/goreleaser/releases/download/v${GORELEASER_VERSION}"
          curl --fail --location --retry 3 --show-error --silent --output "${archive}" "${base_url}/${archive}"
          curl --fail --location --retry 3 --show-error --silent --output checksums.txt "${base_url}/checksums.txt"
          grep " ${archive}$" checksums.txt | sha256sum --check -
          tar -xzf "${archive}" goreleaser
          install -D -m 0755 goreleaser "${HOME}/.local/bin/goreleaser"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Install cosign and syft
        env:
          COSIGN_VERSION: 3.1.1
          SYFT_VERSION: 1.45.1
        run: |
          cd "${RUNNER_TEMP}"

          curl --fail --location --retry 3 --show-error --silent \
            --output cosign-linux-amd64 \
            "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign-linux-amd64"
          curl --fail --location --retry 3 --show-error --silent \
            --output cosign_checksums.txt \
            "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign_checksums.txt"
          grep " cosign-linux-amd64$" cosign_checksums.txt | sha256sum --check -
          install -D -m 0755 cosign-linux-amd64 "${HOME}/.local/bin/cosign"

          syft_archive="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl --fail --location --retry 3 --show-error --silent \
            --output "${syft_archive}" \
            "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/${syft_archive}"
          curl --fail --location --retry 3 --show-error --silent \
            --output syft_checksums.txt \
            "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_checksums.txt"
          grep " ${syft_archive}$" syft_checksums.txt | sha256sum --check -
          tar -xzf "${syft_archive}" syft
          install -D -m 0755 syft "${HOME}/.local/bin/syft"

      - name: Run static analysis
        run: go vet ./...

      - name: Run vulnerability scan
        run: make vulncheck

      - name: Run unit tests
        run: go test -race -count=1 ./...

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: goreleaser release --clean

      - name: Sign checksums and generate SBOMs
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob --yes --bundle dist/checksums.txt.sigstore.json dist/checksums.txt
          for archive in dist/dbf_*.tar.gz; do
            syft "$archive" -o spdx-json="${archive}.sbom.spdx.json"
          done

      - name: Upload supply-chain artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/checksums.txt.sigstore.json \
            dist/dbf_*.tar.gz.sbom.spdx.json \
            --clobber

      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/checksums.txt

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: scripts/update-homebrew-formula.sh "${GITHUB_REF_NAME}" dist/checksums.txt

  verify-linux:
    name: Post-release verification (linux/amd64)
    needs: release
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install cosign
        env:
          COSIGN_VERSION: 3.1.1
        run: |
          cd "${RUNNER_TEMP}"
          curl --fail --location --retry 3 --show-error --silent \
            --output cosign-linux-amd64 \
            "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign-linux-amd64"
          curl --fail --location --retry 3 --show-error --silent \
            --output cosign_checksums.txt \
            "https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign_checksums.txt"
          grep " cosign-linux-amd64$" cosign_checksums.txt | sha256sum --check -
          install -D -m 0755 cosign-linux-amd64 "${HOME}/.local/bin/cosign"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Verify curl installer on Linux amd64
        run: |
          prefix="${RUNNER_TEMP}/debianform-install"
          sh scripts/install.sh \
            --version "${{ needs.release.outputs.tag }}" \
            --prefix "${prefix}" \
            --os linux \
            --arch amd64 \
            --force
          "${prefix}/bin/dbf" version | tee "${RUNNER_TEMP}/dbf-version.txt"
          grep "${{ needs.release.outputs.tag }}" "${RUNNER_TEMP}/dbf-version.txt"
          "${prefix}/bin/dbf" validate -f examples/bbr.dbf.hcl
          "${prefix}/bin/dbf" plan -f examples/bbr.dbf.hcl --offline

      - name: Verify supply-chain artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.release.outputs.tag }}"
          artifact="dbf_${tag}_linux_amd64.tar.gz"
          mkdir -p "${RUNNER_TEMP}/supply-chain"
          gh release download "$tag" \
            --pattern checksums.txt \
            --pattern checksums.txt.sigstore.json \
            --pattern "$artifact" \
            --dir "${RUNNER_TEMP}/supply-chain"
          cd "${RUNNER_TEMP}/supply-chain"
          sha256sum --check --ignore-missing checksums.txt
          cosign verify-blob \
            --bundle checksums.txt.sigstore.json \
            --certificate-identity-regexp 'https://github.com/mofelee/debianform/.github/workflows/release.yml@refs/tags/v.*' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            checksums.txt
          gh attestation verify "$artifact" --repo mofelee/debianform

      - name: Verify Homebrew path when available
        id: homebrew
        run: |
          if ! command -v brew >/dev/null 2>&1; then
            echo "status=manual/best-effort" >> "$GITHUB_OUTPUT"
            echo "Homebrew is not installed on this runner; skipping brew install/test." >&2
            exit 0
          fi
          brew update
          brew tap mofelee/debianform
          brew install mofelee/debianform/dbf
          brew test mofelee/debianform/dbf
          brew upgrade dbf
          echo "status=yes" >> "$GITHUB_OUTPUT"

      - name: Write Linux verification result
        run: |
          homebrew_status="${{ steps.homebrew.outputs.status }}"
          if [ -z "$homebrew_status" ]; then
            homebrew_status="manual/best-effort"
          fi
          cat > "${RUNNER_TEMP}/linux-verification.env" <<EOF
          linux_amd64_curl=yes
          linux_amd64_homebrew=${homebrew_status}
          EOF

      - name: Upload Linux verification result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-verification-linux-amd64-${{ needs.release.outputs.tag }}
          path: ${{ runner.temp }}/linux-verification.env
          if-no-files-found: error
          retention-days: 30

  verify-macos:
    name: Post-release verification (${{ matrix.platform }})
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin/amd64
            runner: macos-26-intel
            arch: amd64
          - platform: darwin/arm64
            runner: macos-26
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify curl installer
        run: |
          prefix="${RUNNER_TEMP}/debianform-install"
          sh scripts/install.sh \
            --version "${{ needs.release.outputs.tag }}" \
            --prefix "${prefix}" \
            --os darwin \
            --arch "${{ matrix.arch }}" \
            --force
          "${prefix}/bin/dbf" version | tee "${RUNNER_TEMP}/dbf-version.txt"
          grep "${{ needs.release.outputs.tag }}" "${RUNNER_TEMP}/dbf-version.txt"
          "${prefix}/bin/dbf" validate -f examples/bbr.dbf.hcl
          "${prefix}/bin/dbf" plan -f examples/bbr.dbf.hcl --offline

      - name: Verify Homebrew path when available
        id: homebrew
        run: |
          if ! command -v brew >/dev/null 2>&1; then
            echo "status=manual/best-effort" >> "$GITHUB_OUTPUT"
            echo "Homebrew is not installed on this runner; skipping brew install/test." >&2
            exit 0
          fi
          brew update
          brew tap mofelee/debianform
          brew install mofelee/debianform/dbf
          brew test mofelee/debianform/dbf
          brew upgrade dbf
          echo "status=yes" >> "$GITHUB_OUTPUT"

      - name: Write macOS verification result
        run: |
          homebrew_status="${{ steps.homebrew.outputs.status }}"
          if [ -z "$homebrew_status" ]; then
            homebrew_status="manual/best-effort"
          fi
          result_file="${RUNNER_TEMP}/macos-${{ matrix.arch }}-verification.env"
          {
            echo "darwin_${{ matrix.arch }}_curl=yes"
            echo "darwin_${{ matrix.arch }}_homebrew=${homebrew_status}"
          } > "$result_file"

      - name: Upload macOS verification result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-verification-darwin-${{ matrix.arch }}-${{ needs.release.outputs.tag }}
          path: ${{ runner.temp }}/macos-${{ matrix.arch }}-verification.env
          if-no-files-found: error
          retention-days: 30

  verify-summary:
    name: Release verification summary
    needs:
      - release
      - verify-linux
      - verify-macos
    if: always() && needs.release.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download verification results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v6.0.0
        with:
          pattern: release-verification-*-${{ needs.release.outputs.tag }}
          path: ${{ runner.temp }}/verification-results
          merge-multiple: true

      - name: Write verification matrix
        run: |
          linux_amd64_curl="failed"
          linux_amd64_homebrew="failed"
          darwin_amd64_curl="failed"
          darwin_amd64_homebrew="failed"
          darwin_arm64_curl="failed"
          darwin_arm64_homebrew="failed"

          for result in "${RUNNER_TEMP}"/verification-results/*.env; do
            [ -f "$result" ] && . "$result"
          done

          cat > "${RUNNER_TEMP}/release-verification-matrix.md" <<EOF
          | Path | linux/amd64 | linux/arm64 | darwin/amd64 | darwin/arm64 |
          | --- | --- | --- | --- | --- |
          | Artifact build | yes | yes | yes | yes |
          | curl install | ${linux_amd64_curl} | manual/best-effort | ${darwin_amd64_curl} | ${darwin_arm64_curl} |
          | Homebrew install | ${linux_amd64_homebrew} | manual/best-effort | ${darwin_amd64_homebrew} | ${darwin_arm64_homebrew} |
          EOF
          cat "${RUNNER_TEMP}/release-verification-matrix.md" >> "$GITHUB_STEP_SUMMARY"

          if grep -q 'failed' "${RUNNER_TEMP}/release-verification-matrix.md"; then
            cat "${RUNNER_TEMP}/release-verification-matrix.md" >&2
            exit 1
          fi

      - name: Add verification matrix to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.release.outputs.tag }}"
          release_body="${RUNNER_TEMP}/release-body.md"
          updated_body="${RUNNER_TEMP}/release-body-updated.md"
          gh release view "$tag" --repo mofelee/debianform --json body --jq '.body // ""' > "$release_body"
          awk '
            /^## Verification Matrix$/ { skip = 1; next }
            skip && /^## / { skip = 0 }
            !skip { print }
          ' "$release_body" > "$updated_body"
          {
            printf '\n## Verification Matrix\n\n'
            cat "${RUNNER_TEMP}/release-verification-matrix.md"
          } >> "$updated_body"
          gh release edit "$tag" --repo mofelee/debianform --notes-file "$updated_body"

      - name: Upload verification matrix
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-verification-${{ needs.release.outputs.tag }}
          path: ${{ runner.temp }}/release-verification-matrix.md
          if-no-files-found: error
          retention-days: 30
