name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Install GoReleaser
        env:
          GORELEASER_VERSION: 2.16.0
        run: |
          cd "${RUNNER_TEMP}"
          archive="goreleaser_Linux_x86_64.tar.gz"
          base_url="https://github.com/goreleaser/goreleaser/releases/download/v${GORELEASER_VERSION}"
          curl --fail --location --retry 3 --show-error --silent --output "${archive}" "${base_url}/${archive}"
          curl --fail --location --retry 3 --show-error --silent --output checksums.txt "${base_url}/checksums.txt"
          grep " ${archive}$" checksums.txt | sha256sum --check -
          tar -xzf "${archive}" goreleaser
          install -D -m 0755 goreleaser "${HOME}/.local/bin/goreleaser"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Run static analysis
        run: go vet ./...

      - name: Run unit tests
        run: go test -race -count=1 ./...

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: goreleaser release --clean

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: scripts/update-homebrew-formula.sh "${GITHUB_REF_NAME}" dist/checksums.txt
