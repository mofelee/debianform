name: Release dry-run

on:
  pull_request:
    paths:
      - ".github/workflows/release-dry-run.yml"
      - ".goreleaser.yaml"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "README.md"
      - "LICENSE"
      - "CHANGELOG.md"
      - "docs/**"
      - "examples/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-dry-run-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snapshot:
    name: Snapshot release
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Install GoReleaser
        run: go install github.com/goreleaser/goreleaser/v2@v2.16.0

      - name: Run static analysis
        run: go vet ./...

      - name: Run unit tests
        run: go test -race -count=1 ./...

      - name: Check GoReleaser config
        run: goreleaser check

      - name: Build snapshot release
        run: goreleaser release --snapshot --clean --skip publish

      - name: Verify snapshot artifacts
        run: |
          test -s dist/checksums.txt
          test -n "$(find dist -maxdepth 1 -name 'dbf_*_linux_amd64.tar.gz' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name 'dbf_*_linux_arm64.tar.gz' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name 'dbf_*_darwin_amd64.tar.gz' -print -quit)"
          test -n "$(find dist -maxdepth 1 -name 'dbf_*_darwin_arm64.tar.gz' -print -quit)"
